# Phase 7: MCP Server Configuration
# Manages MCP server connections with OAuth support

mcp:
  # Enable/disable MCP integration
  enabled: true

  # Retry configuration for failed connections
  retry:
    maxAttempts: 3
    backoffMs: 1000

  # Token cache settings (for OAuth tokens)
  tokenCache:
    enabled: true
    path: ./data/mcp-tokens.json

  # Path to MCP servers configuration file
  serversConfigPath: ./config/mcp-servers.yml

  # Default timeout for MCP operations (ms)
  defaultTimeout: 30000

  # Enable automatic reconnection on disconnect
  autoReconnect: true

  # Maximum concurrent MCP server connections
  maxConnections: 10

