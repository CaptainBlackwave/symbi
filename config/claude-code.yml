# Phase 7: Claude Code Integration Configuration
# Terminal-based interaction with Symbi agent

claudeCode:
  # Enable/disable Claude Code CLI
  enabled: true

  # API endpoints
  endpoints:
    chat: /api/v1/chat
    chatStream: /api/v1/chat/stream
    health: /api/v1/health
    models: /api/v1/models
    skills: /api/v1/skills
    threads: /api/v1/threads
    upload: /api/v1/upload

  # Execution modes
  modes:
    flash:
      description: "Fast responses, lower quality"
      maxTokens: 1000
      temperature: 0.3
    standard:
      description: "Balanced speed and quality"
      maxTokens: 2000
      temperature: 0.7
    pro:
      description: "Planning mode, higher quality"
      maxTokens: 4000
      temperature: 0.5
    ultra:
      description: "Sub-agents enabled, highest quality"
      maxTokens: 8000
      temperature: 0.7
      subAgentsEnabled: true

  # File upload settings
  upload:
    maxSize: 10MB
    allowedTypes:
      - application/pdf
      - text/plain
      - text/markdown
      - application/json
      - image/*

  # Streaming settings
  streaming:
    enabled: true
    chunkSize: 1024
    flushInterval: 100

  # Thread management
  threads:
    maxPerUser: 50
    maxMessagesPerThread: 1000
    autoArchiveDays: 30