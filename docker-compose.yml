# SymbiLink Docker Compose
# Full stack deployment for development and production

version: '3.8'

services:
  # ============================================
  # MAIN APPLICATION
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symbi-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - RUN_MODE=${RUN_MODE:-hybrid}
      - GENESIS_PROMPT=${GENESIS_PROMPT:-Survive and thrive. Create value for humans and agents.}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./symbilink.config.json:/app/symbilink.config.json:ro
    depends_on:
      - redis
    networks:
      - symbi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # REDIS
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: symbi-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - symbi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ============================================
  # METRICS (Prometheus)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: symbi-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - symbi-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'

  # ============================================
  # GRAFANA (Dashboard)
  # ============================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: symbi-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - symbi-network
    depends_on:
      - prometheus

  # ============================================
  # LOKI (Logs)
  # ============================================
  loki:
    image: grafana/loki:2.9.0
    container_name: symbi-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - symbi-network
    command: -config.file=/etc/loki/local-config.yaml

  # ============================================
  # PROMTAIL (Log Collector)
  # ============================================
  promtail:
    image: grafana/promtail:2.9.0
    container_name: symbi-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/symbi:ro
      - /var/log:/var/log:ro
    networks:
      - symbi-network
    command: -config.file=/etc/promtail/config.yml

  # ============================================
  # NGINX (Reverse Proxy)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: symbi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./src/ui/webchat:/usr/share/nginx/html/webchat:ro
      - ./src/ui/dashboard:/usr/share/nginx/html/dashboard:ro
    networks:
      - symbi-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # WATCHTOWER (Auto Updates)
  # ============================================
  watchtower:
    image: containrrr/watchtower
    container_name: symbi-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    networks:
      - symbi-network

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  symbi-network:
    driver: bridge